<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>🔥 Proje Editörü v2.1 - Bahadır Kuş</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root { --bg: #0f172a; --panel: #1e293b; --border: #334155; --text: #f1f5f9; --accent: #3b82f6; --danger: #ef4444; }
    * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
    
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; overflow: hidden; }

    /* --- SIDEBAR --- */
    .sidebar { width: 260px; background: var(--panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
    .sidebar-header { padding: 20px; border-bottom: 1px solid var(--border); font-weight: 600; letter-spacing: 1px; text-align: center; color: var(--accent); }
    
    .project-list { list-style: none; overflow-y: auto; flex: 1; }
    .project-list li { 
      padding: 15px 20px; cursor: pointer; border-bottom: 1px solid var(--border); font-size: 14px; transition: 0.2s; display: flex; justify-content: space-between;
    }
    .project-list li:hover { background: #334155; }
    .project-list li.active { background: var(--accent); color: white; border-color: var(--accent); }
    
    .add-btn { padding: 15px; background: #10b981; color: white; border: none; cursor: pointer; font-weight: 600; font-size: 14px; transition: 0.2s; }
    .add-btn:hover { background: #059669; }

    /* --- MAIN AREA --- */
    .main { flex: 1; display: flex; overflow: hidden; }
    
    /* EDITOR FORM */
    .editor-container { flex: 2; padding: 30px; overflow-y: auto; border-right: 1px solid var(--border); }
    
    .section-title { font-size: 18px; font-weight: 600; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 1px solid var(--border); color: var(--accent); }

    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
    .full-width { grid-column: span 2; }

    .form-group { margin-bottom: 15px; }
    label { display: block; font-size: 11px; text-transform: uppercase; color: #94a3b8; margin-bottom: 6px; font-weight: 600; }
    
    input, textarea, select { 
      width: 100%; background: #0f172a; border: 1px solid var(--border); color: white; 
      padding: 10px; border-radius: 6px; font-size: 14px; font-family: inherit; transition: 0.2s;
    }
    input:focus, textarea:focus { border-color: var(--accent); }
    textarea { resize: vertical; min-height: 80px; line-height: 1.5; }

    /* CHECKBOXES */
    .checkbox-group { display: flex; flex-direction: column; gap: 5px; flex-wrap: wrap; }
    .cb-label { 
      display: flex; align-items: center; gap: 8px; padding: 8px 12px; 
      background: #0f172a; border: 1px solid var(--border); border-radius: 6px; cursor: pointer; font-size: 13px;
    }
    .cb-label:hover { border-color: var(--accent); }
    .cb-label input { width: auto; margin: 0; }

    /* DYNAMIC LISTS (GALLERY/LINKS) */
    .dynamic-list { display: flex; flex-direction: column; gap: 10px; }
    .dynamic-item { 
      display: grid; grid-template-columns: 80px 1fr 100px auto; gap: 10px; align-items: center;
      background: #0f172a; padding: 10px; border-radius: 8px; border: 1px solid var(--border); 
    }
    .link-item { grid-template-columns: 1fr 1fr auto; } 

    .btn-icon { 
      width: 30px; height: 30px; border-radius: 4px; border: none; cursor: pointer; 
      display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 16px;
    }
    .btn-up, .btn-down { background: #475569; color: white; }
    .btn-del { background: var(--danger); color: white; }
    .btn-add-item { background: #334155; color: #94a3b8; border: 1px dashed #475569; width: 100%; padding: 10px; cursor: pointer; border-radius: 6px; margin-top: 10px; }
    .btn-add-item:hover { background: #1e293b; color: white; border-color: var(--accent); }

    /* PREVIEW / CODE AREA */
    .code-container { flex: 1; background: #020617; display: flex; flex-direction: column; border-left: 1px solid var(--border); }
    .code-header { padding: 15px; background: #1e293b; border-bottom: 1px solid var(--border); font-size: 13px; font-weight: 600; display: flex; justify-content: space-between; align-items: center; }
    .code-box { flex: 1; background: #0b1120; color: #22c55e; padding: 20px; font-family: 'Consolas', monospace; font-size: 12px; border: none; resize: none; line-height: 1.5; }
    
    .copy-btn { background: var(--accent); color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: 600; }
    .copy-btn:active { transform: scale(0.95); }

    .delete-project-btn { background: transparent; border: 1px solid var(--danger); color: var(--danger); padding: 10px; width: 100%; margin-top: 30px; border-radius: 6px; cursor: pointer; }
    .delete-project-btn:hover { background: var(--danger); color: white; }

  </style>
</head>
<body>

  <div class="sidebar">
    <div class="sidebar-header">PROJELER</div>
    <ul class="project-list" id="projectList"></ul>
    <button class="add-btn" onclick="addNewProject()">+ YENİ PROJE EKLE</button>
  </div>

  <div class="main">
    
    <div class="editor-container" id="editorPanel" style="display:none;">
      <div class="section-title">Proje Bilgileri</div>
      
      <div class="form-grid">
        <div class="form-group">
          <label>ID (Link için kullanılır - boşluksuz)</label>
          <input type="text" id="p_id" oninput="updateField('id', this.value)">
        </div>
        <div class="form-group">
          <label>Tarih (YYYY-MM)</label>
          <input type="text" id="p_date" oninput="updateField('date', this.value)">
        </div>
        
        <div class="form-group full-width">
          <label>Proje Başlığı</label>
          <input type="text" id="p_name" oninput="updateField('name', this.value)">
        </div>

        <div class="form-group">
          <label>Rol / Unvan</label>
          <input type="text" id="p_role" oninput="updateField('role', this.value)">
        </div>
        <div class="form-group">
          <label>Teknolojiler (Tagline)</label>
          <input type="text" id="p_tagline" oninput="updateField('tagline', this.value)">
        </div>
      </div>

      <div class="form-group">
        <label>Kategoriler</label>
        <div class="checkbox-group">
          <label class="cb-label"><input type="checkbox" value="software" onchange="updateTypes()"> Software</label>
          <label class="cb-label"><input type="checkbox" value="technical-design" onchange="updateTypes()"> Technical Design & Gömülü Yazılım</label>
        </div>
      </div>

      <div class="form-group">
        <label>Kısa Açıklama (Kart Üzerinde)</label>
        <textarea id="p_short" style="min-height:60px;" oninput="updateField('shortDesc', this.value)"></textarea>
      </div>

      <div class="form-group">
        <label>Uzun Açıklama (Detay Penceresi)</label>
        <textarea id="p_long" style="min-height:120px;" oninput="updateField('longDesc', this.value)"></textarea>
      </div>

      <div class="form-group">
        <label>Kapak Görseli (Yol)</label>
        <input type="text" id="p_cover" oninput="updateField('coverImage', this.value)">
      </div>

      <div class="section-title" style="margin-top:30px;">Galeri (Resim / Video)</div>
      <div id="galleryContainer" class="dynamic-list"></div>
      <button class="btn-add-item" onclick="addGalleryItem()">+ Medya Ekle</button>

      <div class="section-title" style="margin-top:30px;">Linkler</div>
      <div id="linksContainer" class="dynamic-list"></div>
      <button class="btn-add-item" onclick="addLinkItem()">+ Link Ekle</button>

      <button class="delete-project-btn" onclick="deleteProject()">Bu Projeyi Sil</button>
    </div>

    <div class="code-container">
      <div class="code-header">
        <span>projects.js Çıktısı</span>
        <button class="copy-btn" onclick="copyCode()">KODU KOPYALA</button>
      </div>
      <textarea class="code-box" id="outputCode" readonly></textarea>
    </div>

  </div>

  <script src="assets/js/projects.js"></script>

  <script>
    let projectsData = window.projects || [];
    let activeIndex = -1;

    function init() {
      renderSidebar();
      if (projectsData.length > 0) {
        selectProject(0);
      }
      updateCodeOutput();
    }

    function renderSidebar() {
      const list = document.getElementById('projectList');
      list.innerHTML = '';
      
      projectsData.sort((a, b) => (a.date < b.date ? 1 : -1));

      projectsData.forEach((p, index) => {
        const li = document.createElement('li');
        li.textContent = p.name || '(İsimsiz Proje)';
        if (index === activeIndex) li.classList.add('active');
        li.onclick = () => selectProject(index);
        list.appendChild(li);
      });
    }

    function selectProject(index) {
      activeIndex = index;
      renderSidebar();
      document.getElementById('editorPanel').style.display = 'block';
      loadForm(projectsData[index]);
    }

    function addNewProject() {
      const newProj = {
        id: "yeni-proje-" + Math.floor(Math.random() * 1000),
        name: "Yeni Proje",
        date: new Date().toISOString().slice(0, 7),
        role: "",
        types: ["software"], // Varsayılan tipi ayarla
        shortDesc: "Kısa açıklama buraya.",
        longDesc: "Uzun açıklama buraya.",
        coverImage: "images/placeholder.jpg",
        gallery: [],
        links: []
      };
      projectsData.unshift(newProj);
      selectProject(0);
      updateCodeOutput();
    }

    function deleteProject() {
      if(confirm("Bu projeyi silmek istediğine emin misin?")) {
        projectsData.splice(activeIndex, 1);
        activeIndex = -1;
        document.getElementById('editorPanel').style.display = 'none';
        renderSidebar();
        updateCodeOutput();
      }
    }

    function loadForm(p) {
      document.getElementById('p_id').value = p.id || '';
      document.getElementById('p_date').value = p.date || '';
      document.getElementById('p_name').value = p.name || '';
      document.getElementById('p_role').value = p.role || '';
      document.getElementById('p_tagline').value = p.tagline || '';
      document.getElementById('p_short').value = p.shortDesc || '';
      document.getElementById('p_long').value = p.longDesc || '';
      document.getElementById('p_cover').value = p.coverImage || '';

      const checkboxes = document.querySelectorAll('.checkbox-group input');
      checkboxes.forEach(cb => {
        cb.checked = p.types && p.types.includes(cb.value);
      });

      renderGalleryInputs();
      renderLinkInputs();
    }

    function updateField(field, value) {
      if (activeIndex === -1) return;
      
      if (field === 'id') {
        value = value.replace(/\s+/g, '-').toLowerCase();
        document.getElementById('p_id').value = value; 
      }

      projectsData[activeIndex][field] = value;
      
      if (field === 'name') renderSidebar(); 
      updateCodeOutput();
    }

    function updateTypes() {
      if (activeIndex === -1) return;
      const selected = [];
      document.querySelectorAll('.checkbox-group input:checked').forEach(cb => selected.push(cb.value));
      projectsData[activeIndex].types = selected;
      updateCodeOutput();
    }

    function renderGalleryInputs() {
      const container = document.getElementById('galleryContainer');
      container.innerHTML = '';
      const gallery = projectsData[activeIndex].gallery || [];

      gallery.forEach((item, idx) => {
        const div = document.createElement('div');
        div.className = 'dynamic-item';
        div.innerHTML = `
          <select onchange="updateGalleryItem(${idx}, 'type', this.value)">
            <option value="image" ${item.type === 'image' ? 'selected' : ''}>Resim</option>
            <option value="youtube" ${item.type === 'youtube' ? 'selected' : ''}>YouTube</option>
          </select>
          <input type="text" placeholder="Dosya yolu veya Link" value="${item.src || ''}" oninput="updateGalleryItem(${idx}, 'src', this.value)">
          <div style="display:flex; gap:5px;">
            <button type="button" class="btn-icon btn-up" onclick="moveGallery(${idx}, -1)">↑</button>
            <button type="button" class="btn-icon btn-down" onclick="moveGallery(${idx}, 1)">↓</button>
          </div>
          <button type="button" class="btn-icon btn-del" onclick="removeGalleryItem(${idx})">×</button>
        `;
        container.appendChild(div);
      });
    }

    function addGalleryItem() {
      if (!projectsData[activeIndex].gallery) projectsData[activeIndex].gallery = [];
      projectsData[activeIndex].gallery.push({ type: 'image', src: '', alt: '' });
      renderGalleryInputs();
      updateCodeOutput();
    }

    function updateGalleryItem(idx, key, val) {
      projectsData[activeIndex].gallery[idx][key] = val;
      if (key === 'src' && projectsData[activeIndex].gallery[idx].alt === '') {
        projectsData[activeIndex].gallery[idx].alt = projectsData[activeIndex].name + ' media';
      }
      updateCodeOutput();
    }

    function removeGalleryItem(idx) {
      projectsData[activeIndex].gallery.splice(idx, 1);
      renderGalleryInputs();
      updateCodeOutput();
    }

    function moveGallery(idx, direction) {
      const gallery = projectsData[activeIndex].gallery;
      const newIndex = idx + direction;
      if (newIndex >= 0 && newIndex < gallery.length) {
        [gallery[idx], gallery[newIndex]] = [gallery[newIndex], gallery[idx]];
        renderGalleryInputs();
        updateCodeOutput();
      }
    }

    function renderLinkInputs() {
      const container = document.getElementById('linksContainer');
      container.innerHTML = '';
      const links = projectsData[activeIndex].links || [];

      links.forEach((item, idx) => {
        const div = document.createElement('div');
        div.className = 'dynamic-item link-item';
        div.innerHTML = `
          <input type="text" placeholder="Etiket (Örn: Google Play)" value="${item.label || ''}" oninput="updateLinkItem(${idx}, 'label', this.value)">
          <input type="text" placeholder="URL" value="${item.url || ''}" oninput="updateLinkItem(${idx}, 'url', this.value)">
          <button type="button" class="btn-icon btn-del" onclick="removeLinkItem(${idx})">×</button>
        `;
        container.appendChild(div);
      });
    }

    function addLinkItem() {
      if (!projectsData[activeIndex].links) projectsData[activeIndex].links = [];
      projectsData[activeIndex].links.push({ label: '', url: '' });
      renderLinkInputs();
      updateCodeOutput();
    }

    function updateLinkItem(idx, key, val) {
      projectsData[activeIndex].links[idx][key] = val;
      updateCodeOutput();
    }

    function removeLinkItem(idx) {
      projectsData[activeIndex].links.splice(idx, 1);
      renderLinkInputs();
      updateCodeOutput();
    }

    function updateCodeOutput() {
      const json = JSON.stringify(projectsData, null, 2);
      const cleanedJson = json.replace(/"alt":\s*"[^"]*",?\n/g, '') 
      
      const code = `// projects.js\n// Generated by Portfolio Editor v2.1\n\nwindow.projects = ${cleanedJson};`;
      document.getElementById('outputCode').value = code;
    }

    function copyCode() {
      const txt = document.getElementById('outputCode');
      txt.select();
      navigator.clipboard.writeText(txt.value).then(() => {
        alert("Kod Kopyalandı! Şimdi projects.js dosyasına yapıştırabilirsin.");
      });
    }

    window.onload = init;
  </script>
</body>
</html>
