<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Portfolio Editor - Bahadır Kuş</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #111827; color: #f3f4f6; margin: 0; display: flex; height: 100vh; overflow: hidden; }
    
    /* LAYOUT */
    .sidebar { width: 250px; background: #1f2937; border-right: 1px solid #374151; display: flex; flex-direction: column; }
    .main { flex: 1; padding: 20px; overflow-y: auto; display: flex; gap: 20px; }
    .editor-area { flex: 2; background: #1f2937; padding: 20px; border-radius: 12px; border: 1px solid #374151; }
    .preview-area { flex: 1; display: flex; flex-direction: column; gap: 10px; }

    /* SIDEBAR LIST */
    .project-list { list-style: none; padding: 0; margin: 0; overflow-y: auto; flex: 1; }
    .project-list li { padding: 12px 16px; cursor: pointer; border-bottom: 1px solid #374151; font-size: 14px; }
    .project-list li:hover { background: #374151; }
    .project-list li.active { background: #2563eb; color: white; }
    .add-btn { padding: 15px; background: #10b981; border: none; color: white; cursor: pointer; font-weight: bold; }
    .add-btn:hover { background: #059669; }

    /* FORM ELEMENTS */
    .form-group { margin-bottom: 15px; }
    label { display: block; font-size: 12px; color: #9ca3af; margin-bottom: 4px; text-transform: uppercase; }
    input, textarea, select { width: 100%; background: #111827; border: 1px solid #4b5563; color: white; padding: 8px; border-radius: 6px; font-size: 14px; }
    textarea { resize: vertical; height: 80px; }
    .row { display: flex; gap: 10px; }
    .col { flex: 1; }

    /* CHECKBOXES */
    .checkbox-group { display: flex; gap: 10px; flex-wrap: wrap; }
    .checkbox-label { display: flex; align-items: center; gap: 6px; font-size: 14px; color: #e5e7eb; text-transform: none; cursor: pointer; background: #374151; padding: 4px 10px; border-radius: 4px; }
    .checkbox-label input { width: auto; margin: 0; }

    /* DYNAMIC LISTS (Gallery/Links) */
    .dynamic-list { border: 1px solid #4b5563; padding: 10px; border-radius: 6px; background: #111827; }
    .dynamic-item { display: flex; gap: 8px; margin-bottom: 8px; align-items: center; background: #1f2937; padding: 8px; border-radius: 4px; }
    .btn-sm { padding: 4px 8px; font-size: 12px; cursor: pointer; border-radius: 4px; border: none; }
    .btn-del { background: #ef4444; color: white; }
    .btn-add { background: #3b82f6; color: white; margin-top: 5px; width: 100%; padding: 6px; }

    /* OUTPUT */
    .output-box { width: 100%; height: 100%; background: #000; color: #0f0; font-family: monospace; padding: 10px; border: 1px solid #374151; border-radius: 8px; resize: none; }
    .copy-btn { background: #2563eb; color: white; padding: 15px; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; }
    .copy-btn:hover { background: #1d4ed8; }

    h2 { margin-top: 0; border-bottom: 1px solid #374151; padding-bottom: 10px; }
  </style>
</head>
<body>

  <div class="sidebar">
    <div style="padding:15px; font-weight:bold; text-align:center; border-bottom:1px solid #374151;">PROJECTS</div>
    <ul class="project-list" id="projectList"></ul>
    <button class="add-btn" onclick="createNew()">+ ADD NEW PROJECT</button>
  </div>

  <div class="main">
    
    <div class="editor-area">
      <h2>Edit Project Details</h2>
      <form id="projectForm">
        <div class="row">
          <div class="col form-group">
            <label>ID (Unique)</label>
            <input type="text" id="p_id" placeholder="e.g., my-new-game">
          </div>
          <div class="col form-group">
            <label>Date (YYYY-MM)</label>
            <input type="text" id="p_date" placeholder="2025-01">
          </div>
        </div>

        <div class="form-group">
          <label>Project Name</label>
          <input type="text" id="p_name">
        </div>

        <div class="row">
          <div class="col form-group">
            <label>Role</label>
            <input type="text" id="p_role" placeholder="e.g. Lead Developer">
          </div>
          <div class="col form-group">
            <label>Tagline (Tech Stack)</label>
            <input type="text" id="p_tagline" placeholder="Unity • VR • C#">
          </div>
        </div>

        <div class="form-group">
          <label>Filters (Types)</label>
          <div class="checkbox-group">
            <label class="checkbox-label"><input type="checkbox" value="software" class="type-check"> Software</label>
            <label class="checkbox-label"><input type="checkbox" value="design" class="type-check"> Design</label>
            <label class="checkbox-label"><input type="checkbox" value="hardware" class="type-check"> Hardware</label>
            <label class="checkbox-label"><input type="checkbox" value="simulation" class="type-check"> Simulation</label>
          </div>
        </div>

        <div class="form-group">
          <label>Short Description</label>
          <textarea id="p_short" style="height:50px;"></textarea>
        </div>

        <div class="form-group">
          <label>Long Description</label>
          <textarea id="p_long"></textarea>
        </div>

        <div class="form-group">
          <label>Cover Image Path</label>
          <input type="text" id="p_cover" placeholder="images/myImage.jpg">
        </div>

        <div class="form-group">
          <label>Gallery (Images / YouTube)</label>
          <div class="dynamic-list" id="galleryList"></div>
          <button type="button" class="btn-sm btn-add" onclick="addGalleryItem()">+ Add Media</button>
        </div>

        <div class="form-group">
          <label>Links</label>
          <div class="dynamic-list" id="linksList"></div>
          <button type="button" class="btn-sm btn-add" onclick="addLinkItem()">+ Add Link</button>
        </div>

        <div style="display:flex; gap:10px; margin-top:20px;">
          <button type="button" class="add-btn" style="flex:1; background:#2563eb;" onclick="saveCurrent()">SAVE CHANGES TO LIST</button>
          <button type="button" class="add-btn" style="flex:1; background:#ef4444;" onclick="deleteCurrent()">DELETE PROJECT</button>
        </div>
      </form>
    </div>

    <div class="preview-area">
      <h2>Final Code</h2>
      <p style="font-size:12px; color:#9ca3af;">
        1. Make your changes.<br>
        2. Click "SAVE CHANGES TO LIST".<br>
        3. Click "COPY CODE" below.<br>
        4. Paste into your <b>projects.js</b> file.
      </p>
      <textarea class="output-box" id="outputCode" readonly></textarea>
      <button class="copy-btn" onclick="copyCode()">COPY CODE</button>
    </div>

  </div>

  <script src="projects.js"></script>

  <script>
    let projectsData = window.projects || [];
    let currentIndex = -1;

    // --- INIT ---
    function renderList() {
      const list = document.getElementById('projectList');
      list.innerHTML = '';
      
      // Sort by date new to old
      projectsData.sort((a, b) => (a.date < b.date ? 1 : -1));

      projectsData.forEach((p, index) => {
        const li = document.createElement('li');
        li.textContent = p.name || '(No Name)';
        li.onclick = () => loadProject(index);
        if (index === currentIndex) li.classList.add('active');
        list.appendChild(li);
      });

      generateCode();
    }

    // --- LOAD ---
    function loadProject(index) {
      currentIndex = index;
      const p = projectsData[index];
      
      document.getElementById('p_id').value = p.id || '';
      document.getElementById('p_name').value = p.name || '';
      document.getElementById('p_role').value = p.role || '';
      document.getElementById('p_tagline').value = p.tagline || '';
      document.getElementById('p_date').value = p.date || '';
      document.getElementById('p_short').value = p.shortDesc || '';
      document.getElementById('p_long').value = p.longDesc || '';
      document.getElementById('p_cover').value = p.coverImage || '';

      // Types
      document.querySelectorAll('.type-check').forEach(cb => {
        cb.checked = p.types && p.types.includes(cb.value);
      });

      // Gallery
      const gList = document.getElementById('galleryList');
      gList.innerHTML = '';
      if (p.gallery) {
        p.gallery.forEach(g => addGalleryItem(g));
      }

      // Links
      const lList = document.getElementById('linksList');
      lList.innerHTML = '';
      if (p.links) {
        p.links.forEach(l => addLinkItem(l));
      }

      renderList();
    }

    function createNew() {
      const newP = {
        id: "new-project-" + Date.now(),
        name: "New Project",
        types: ["software"],
        gallery: [],
        links: []
      };
      projectsData.unshift(newP);
      loadProject(0);
    }

    // --- DYNAMIC FIELDS ---
    function addGalleryItem(data = {type:'image', src:'', alt:''}) {
      const div = document.createElement('div');
      div.className = 'dynamic-item';
      div.innerHTML = `
        <select onchange="updateState()">
          <option value="image" ${data.type=='image'?'selected':''}>Image</option>
          <option value="youtube" ${data.type=='youtube'?'selected':''}>YouTube</option>
        </select>
        <input type="text" placeholder="Source (path or url)" value="${data.src||''}" oninput="updateState()">
        <button type="button" class="btn-sm btn-del" onclick="this.parentElement.remove(); updateState()">X</button>
      `;
      document.getElementById('galleryList').appendChild(div);
    }

    function addLinkItem(data = {label:'', url:''}) {
      const div = document.createElement('div');
      div.className = 'dynamic-item';
      div.innerHTML = `
        <input type="text" placeholder="Label" value="${data.label||''}" oninput="updateState()">
        <input type="text" placeholder="URL" value="${data.url||''}" oninput="updateState()">
        <button type="button" class="btn-sm btn-del" onclick="this.parentElement.remove(); updateState()">X</button>
      `;
      document.getElementById('linksList').appendChild(div);
    }

    // --- SAVE & DELETE ---
    function saveCurrent() {
      if (currentIndex === -1) return;
      
      const p = projectsData[currentIndex];
      p.id = document.getElementById('p_id').value;
      p.name = document.getElementById('p_name').value;
      p.role = document.getElementById('p_role').value;
      p.tagline = document.getElementById('p_tagline').value;
      p.date = document.getElementById('p_date').value;
      p.shortDesc = document.getElementById('p_short').value;
      p.longDesc = document.getElementById('p_long').value;
      p.coverImage = document.getElementById('p_cover').value;

      // Types
      p.types = [];
      document.querySelectorAll('.type-check:checked').forEach(cb => p.types.push(cb.value));

      // Gallery
      p.gallery = [];
      document.querySelectorAll('#galleryList .dynamic-item').forEach(item => {
        const selects = item.querySelectorAll('select');
        const inputs = item.querySelectorAll('input');
        p.gallery.push({
          type: selects[0].value,
          src: inputs[0].value,
          alt: p.name + " media"
        });
      });

      // Links
      p.links = [];
      document.querySelectorAll('#linksList .dynamic-item').forEach(item => {
        const inputs = item.querySelectorAll('input');
        p.links.push({
          label: inputs[0].value,
          url: inputs[1].value
        });
      });

      alert("Project Saved to List! Now Copy the Code.");
      renderList();
    }

    function deleteCurrent() {
      if (confirm("Are you sure you want to delete this project?")) {
        projectsData.splice(currentIndex, 1);
        currentIndex = -1;
        renderList();
        document.getElementById('projectForm').reset();
        document.getElementById('galleryList').innerHTML = '';
        document.getElementById('linksList').innerHTML = '';
      }
    }

    function updateState() {
      // Optional: Auto-update local object on typing
    }

    // --- GENERATE CODE ---
    function generateCode() {
      const json = JSON.stringify(projectsData, null, 2);
      const finalCode = `// projects.js\n// Generated by Portfolio Editor\n\nwindow.projects = ${json};`;
      document.getElementById('outputCode').value = finalCode;
    }

    function copyCode() {
      const copyText = document.getElementById("outputCode");
      copyText.select();
      copyText.setSelectionRange(0, 99999); 
      navigator.clipboard.writeText(copyText.value);
      alert("Code Copied! Now paste it into your 'projects.js' file.");
    }

    // Start
    renderList();
    if(projectsData.length > 0) loadProject(0);
  </script>
</body>
</html>
